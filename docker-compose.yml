services:
  google-ads-mcp:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
